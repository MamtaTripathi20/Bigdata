version: "3.9"

services:
  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: music_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_user -d music_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: music_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # FIX CORS: configurable via env var — no code change needed for staging/prod
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # FIX DOCKER: only mount app code for hot-reload.
      # Old: ./backend:/app mounted EVERYTHING including models, which meant:
      #   1. The Dockerfile's COPY . . was silently ignored at runtime.
      #   2. --reload watched ALL files including docs/CSVs, triggering
      #      the 78-second embedding model warmup on every save.
      # Fix: mount only app/ for code hot-reload. Models live in their
      #      own named volume so they persist from the image build.
      - ./backend/app:/app/app
      - ./scripts:/app/scripts
      - backend_models:/app/models
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app

  # ─── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: music_frontend
    ports:
      - "3000:3000"
    environment:
      # Browser-side API calls — localhost:8000 is correct because the
      # browser resolves this against the HOST machine, not the container.
      # For SSR fetches add: INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  backend_models:   # Persists FCM model + embedding index from image build
